plugins {
    id 'com.android.application'
}

android {
    namespace 'com.jc.dobladoryt'
    compileSdk 34

    defaultConfig {
        applicationId "com.jc.dobladoryt"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'

    // Traducción offline gratuita de Google (ML Kit)
    implementation 'com.google.mlkit:translate:17.0.3'

    // Extraccion de audio de YouTube (open source, sin API de pago)
    implementation 'com.github.TeamNewPipe:NewPipeExtractor:0.24.4'

    // Cliente HTTP usado por el extractor
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
}
